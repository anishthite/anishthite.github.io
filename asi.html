<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }

        .mobile-message {
            display: none;
            color: white;
            text-align: center;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 24px;
            font-weight: 600;
        }

        .mobile-message .icon {
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
        }

        .image-container {
            max-width: 90vw;
            max-height: 90vh;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .image-container img {
            display: block;
            max-width: 100%;
            max-height: calc(90vh - 24px);
            height: auto;
            border-radius: 4px;
        }

        body.is-mobile .image-container {
            display: none;
        }

        body.is-mobile .mobile-message {
            display: block;
        }
    </style>
</head>
<body>
    <div class="mobile-message">
        <span class="icon">📱</span>
        This doesn't show on mobile
    </div>
    <div class="image-container">
        <img src="https://anishthite.github.io/cf7dfef9-cbc3-486c-ab26-d9b8da49b8ba.png" alt="Image">
    </div>

    <script>
        function isMobile() {
            // Check for mobile user agent
            const mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
            const isMobileUA = mobileRegex.test(navigator.userAgent);
            
            // Check for touch device with small screen
            const isSmallScreen = window.innerWidth <= 768;
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            return isMobileUA || (isSmallScreen && isTouchDevice);
        }

        function checkMobile() {
            if (isMobile()) {
                document.body.classList.add('is-mobile');
            } else {
                document.body.classList.remove('is-mobile');
            }
        }

        // Check on load
        checkMobile();

        // Re-check on resize (for responsive testing)
        window.addEventListener('resize', checkMobile);
    </script>
</body>
</html>
