<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Viewer</title>
  <style>
    @font-face{font-family:et-book;src:url("vendor/et-book/et-book-roman-line-figures.woff") format("woff");font-weight:400;font-style:normal;font-display:swap}
    @font-face{font-family:et-book;src:url("vendor/et-book/et-book-bold-line-figures.woff") format("woff");font-weight:700;font-style:normal;font-display:swap}
    @font-face{font-family:et-book;src:url("vendor/et-book/et-book-italic.woff2") format("woff2");font-weight:400;font-style:italic;font-display:swap}
    :root{--paper:#fbf4e6;--ink:#21160d;--muted:#746756;--rule:#ddcfb8;--serif:et-book,Palatino,"Palatino Linotype","Palatino LT STD","Book Antiqua",Georgia,serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;padding:24px;background:linear-gradient(90deg,rgba(108,74,36,.035) 1px,transparent 1px) 0 0/28px 28px,var(--paper);color:var(--ink);font-family:var(--serif);font-size:18px;line-height:1.45}
    main{max-width:1120px;margin:0 auto}
    header{border-bottom:1px solid var(--ink);padding:18px 0 12px;margin-bottom:22px}
    h1{margin:0;font-size:clamp(2rem,7vw,4.5rem);line-height:1;letter-spacing:-.03em}
    p{margin:.5rem 0 0;color:var(--muted)}
    img{display:block;max-width:100%;max-height:calc(100vh - 180px);height:auto;border:1px solid var(--rule)}
    .mobile-message{display:none;border-top:1px solid var(--rule);padding-top:16px}
    body.is-mobile .image-container{display:none}
    body.is-mobile .mobile-message{display:block}
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Image viewer</h1>
      <p class="mobile-message">This image is desktop-only.</p>
    </header>
    <div class="image-container">
      <img src="https://anishthite.github.io/cf7dfef9-cbc3-486c-ab26-d9b8da49b8ba.png" alt="Image">
    </div>
  </main>
  <script>
    function isMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (innerWidth <= 768 && ('ontouchstart' in window || navigator.maxTouchPoints > 0));
    }
    function checkMobile() { document.body.classList.toggle('is-mobile', isMobile()); }
    checkMobile();
    addEventListener('resize', checkMobile);
  </script>
</body>
</html>
