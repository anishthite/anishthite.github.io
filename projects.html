  <style>
    body.projects-page { --measure: 1120px; }
    .projects-page main { padding: 50px 0 72px; }
    .projects-page h1 { max-width: 13ch; margin-bottom: 30px !important; }
    .projects-page h2, .projects-page p, .projects-page li { max-width: none; }
    .projects-hero { border-bottom: 1px solid var(--ink); margin-bottom: 18px; }
    .projects-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    .project-card {
      color: var(--ink) !important;
      display: flex;
      flex-direction: column;
      min-height: 430px;
      border: 1px solid var(--rule);
      background: rgba(255,255,255,.18);
      overflow: hidden;
      text-decoration: none !important;
    }
    .project-card:hover { border-color: var(--ink); background: rgba(255,255,255,.34); text-decoration: none !important; }
    .project-card *, .project-card:hover * { text-decoration: none !important; }
    .project-image { display: block; width: 100%; aspect-ratio: 16 / 10; object-fit: cover; border-bottom: 1px solid var(--rule); background: var(--soft); }
    .project-body { display: flex; flex: 1; flex-direction: column; justify-content: space-between; padding: 17px; }
    .project-title { font-size: clamp(1.35rem, 2.4vw, 2rem) !important; margin: 0 0 12px !important; max-width: 13ch; }
    .project-summary { font-size: 1.04rem; line-height: 1.42; margin-bottom: 18px !important; }
    .project-time { color: var(--muted) !important; font-size: .94rem; margin: 0 0 18px !important; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 22px; }
    .project-tags span { border: 1px solid var(--rule); color: var(--muted); font-size: .84rem; padding: 2px 7px; }
    @media (max-width: 920px) { .projects-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px) { .projects-grid { grid-template-columns: 1fr; } }
  </style>
</head>

          <ul class="flex space-x-6">

            <li><a href="projects.html" class="text-stone-100 hover:text-stone-300 transition-colors">Projects</a></li>

  <!-- Add a project here; the preview grid renders from this one list. -->
  <script id="projects-data" type="application/json">
[

  {"title":"Pacman Prompts","period":"2024","type":"Agent tooling","url":"https://github.com/anishthite/pacman-prompts","summary":"Prompting as code: a small repo for treating reusable prompts like buildable software.","tags":["prompts","python","agents"],"visual":"prompt files as code"},

  {"title":"Color Lift","period":"2026","type":"Chrome extension","url":"https://github.com/anishthite/color-lift","summary":"A browser extension that lifts colors from a page to turn them into a theme.","tags":["extension","color","themes"],"visual":"sample → palette → theme"},
  {"title":"Markdowny","period":"2026","type":"Desktop app","url":"https://github.com/anishthite/markdowny","summary":"A tiny desktop markdown reader.","tags":["desktop","markdown","typescript"],"visual":"local notes in a reader"},

  <script>
    const projects = JSON.parse(document.getElementById('projects-data').textContent);
    const esc = value => String(value).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const palettes = [
      ['#f3e3c8', '#21160d', '#9a6231'], ['#e8e0ce', '#21160d', '#6b6f44'], ['#efe7d8', '#21160d', '#9b4f3d'],
      ['#eadfcb', '#21160d', '#5f6f82'], ['#f1e5d2', '#21160d', '#80613f'], ['#e7ddcf', '#21160d', '#7b574a']
    ];
    const wrap = (text, max) => {
      const words = String(text).split(/\s+/), lines = [];
      let line = '';
      words.forEach(word => {
        if ((line + ' ' + word).trim().length > max && line) { lines.push(line); line = word; }
        else line = (line + ' ' + word).trim();
      });
      if (line) lines.push(line);
      return lines.slice(0, 3);
    };
    const preview = (project, index) => {
      const [bg, ink, accent] = palettes[index % palettes.length];
      const visual = wrap(project.visual || project.tags.join(' · '), 32).map((line, i) => `<text x="38" y="${300 + i * 27}" font-size="22" fill="${accent}">${esc(line)}</text>`).join('');
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
        <rect width="640" height="400" fill="${bg}"/>
        <path d="M0 318 C150 250 270 380 420 300 S570 225 640 280" fill="none" stroke="${accent}" stroke-width="3" opacity=".42"/>
        <path d="M70 60 H570 M70 340 H570" stroke="${ink}" opacity=".25"/>
        <circle cx="510" cy="108" r="56" fill="${accent}" opacity=".14"/>
        <circle cx="560" cy="150" r="20" fill="${accent}" opacity=".24"/>
        <path d="M92 210 C190 135 260 250 350 175 S480 145 552 214" fill="none" stroke="${ink}" stroke-width="2" opacity=".28"/>
        ${visual}
      </svg>`;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    };

    document.getElementById('projects-grid').innerHTML = projects.map((project, index) => `
      <a class="project-card" href="${esc(project.url)}" aria-label="${esc(project.title)} project">
        <img class="project-image" src="${preview(project, index)}" alt="">
        <div class="project-body">
          <div>
            <h2 class="project-title">${esc(project.title)}</h2>
            <p class="project-summary">${esc(project.summary)}</p>
            <p class="project-time">${esc(project.period)} · ${esc(project.type)}</p>
          </div>
          <div class="project-tags">${project.tags.map(tag => `<span>${esc(tag)}</span>`).join('')}</div>
        </div>
      </a>
    `).join('');
  </script>
</body>
